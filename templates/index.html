<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor | AI Diagnosis</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container glass-panel">
        <header>
            <h1>Heart Disease <span class="accent">Predictor</span></h1>
            <p>Enter the patient's vitals to receive an instant XGBoost diagnostic probability.</p>
        </header>

        <form id="prediction-form">
            <div class="form-grid">
                <!-- Row 1 -->
                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" required min="1" max="120" placeholder="e.g. 55">
                </div>
                <div class="input-group">
                    <label for="sex">Sex</label>
                    <select id="sex" name="sex" required>
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <!-- Row 2 -->
                <div class="input-group">
                    <label for="cp">Chest Pain Type</label>
                    <select id="cp" name="cp" required>
                        <option value="0">Typical Angina (0)</option>
                        <option value="1">Atypical Angina (1)</option>
                        <option value="2">Non-anginal Pain (2)</option>
                        <option value="3">Asymptomatic (3)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="trestbps">Resting Blood Pressure (mm Hg)</label>
                    <input type="number" id="trestbps" name="trestbps" required placeholder="e.g. 130">
                </div>

                <!-- Row 3 -->
                <div class="input-group">
                    <label for="chol">Serum Cholestoral (mg/dl)</label>
                    <input type="number" id="chol" name="chol" required placeholder="e.g. 250">
                </div>
                <div class="input-group">
                    <label for="fbs">Fasting Blood Sugar > 120 mg/dl</label>
                    <select id="fbs" name="fbs" required>
                        <option value="0">False (0)</option>
                        <option value="1">True (1)</option>
                    </select>
                </div>

                <!-- Row 4 -->
                <div class="input-group">
                    <label for="restecg">Resting ECG Results</label>
                    <select id="restecg" name="restecg" required>
                        <option value="0">Normal (0)</option>
                        <option value="1">ST-T wave abnormality (1)</option>
                        <option value="2">Probable Left Ventricular Hypertrophy (2)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="thalach">Max Heart Rate</label>
                    <input type="number" id="thalach" name="thalach" required placeholder="e.g. 150">
                </div>

                <!-- Row 5 -->
                <div class="input-group">
                    <label for="exang">Exercise Induced Angina</label>
                    <select id="exang" name="exang" required>
                        <option value="0">No (0)</option>
                        <option value="1">Yes (1)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="oldpeak">ST Depression (Oldpeak)</label>
                    <input type="number" id="oldpeak" name="oldpeak" step="0.1" required placeholder="e.g. 1.5">
                </div>

                <!-- Row 6 -->
                <div class="input-group">
                    <label for="slope">Slope of Peak Exercise ST Segment</label>
                    <select id="slope" name="slope" required>
                        <option value="0">Upsloping (0)</option>
                        <option value="1">Flat (1)</option>
                        <option value="2">Downsloping (2)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="ca">Major Vessels Colored by Fluoroscopy</label>
                    <select id="ca" name="ca" required>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <!-- Row 7 -->
                <div class="input-group full-width">
                    <label for="thal">Thalassemia</label>
                    <select id="thal" name="thal" required>
                        <option value="0">Error (0)</option>
                        <option value="1">Fixed Defect (1)</option>
                        <option value="2">Normal (2)</option>
                        <option value="3">Reversable Defect (3)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="predictBtn">
                <span class="btn-text">Analyze Vitals</span>
                <div class="loader hidden"></div>
            </button>
        </form>

        <div id="result-section" class="result-glass hidden">
            <h2 id="result-title">Analysis Complete</h2>
            <div class="prob-wrapper">
                <div class="prob-bar-container">
                    <div class="prob-fill" id="prob-fill"></div>
                </div>
                <span id="prob-text">0%</span>
            </div>
            <p id="result-description">Awaiting submission...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
